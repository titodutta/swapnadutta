<!-- _layouts/default.html -->
<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  {% if page.description %}
  <meta name="description" content="{{ page.description | escape }}">
  {% endif %}

  <link rel="stylesheet" href="{{ '/assets/css/global.css' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include header.html %}

  <main id="main-content" class="site-main">

    <div class="container">

      <article class="content-card">
        {{ content }}
      </article>

    </div>

  </main>

  {% include footer.html %}

</body>
</html>
