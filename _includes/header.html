<header class="site-header">
  <div class="container">
    <a href="/" class="site-title">Swapna Dutta</a>
    
    <nav class="site-nav" aria-label="Main navigation">
      <a href="/" {% if page.url == "/" %}class="active" aria-current="page"{% endif %}>Home</a>
      <a href="/articles/" {% if page.url == "/articles/" %}class="active" aria-current="page"{% endif %}>Articles</a>
      <a href="/photos/" {% if page.url == "/photos/" %}class="active" aria-current="page"{% endif %}>Photos</a>
    </nav>

    <div class="header-utilities">
      <!-- Search Box -->
      <form class="header-search" action="/search/" method="get" role="search">
        <label for="search-input" class="sr-only">Search this site</label>
        <input 
          type="search" 
          id="search-input" 
          name="q" 
          placeholder="Search..." 
          aria-label="Search this site"
        >
        <button type="submit" aria-label="Submit search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </form>

      <!-- Font Size Controls -->
      <div class="font-size-controls" aria-label="Font size controls">
        <button class="font-size-btn" data-size="small" aria-label="Small font size" title="Small text">A</button>
        <button class="font-size-btn active" data-size="medium" aria-label="Medium font size (default)" title="Medium text">A</button>
        <button class="font-size-btn" data-size="large" aria-label="Large font size" title="Large text">A</button>
      </div>

      <!-- Reading Mode Toggle -->
      <button class="reading-mode-toggle" id="readingModeToggle" aria-label="Toggle reading mode" title="Reading mode">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6H13M5 9H13M5 12H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Google Translate -->
      <div id="google_translate_element" class="google-translate"></div>
    </div>
  </div>
</header>

<!-- Google Translate Script -->
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,hi,bn,as,gu,kn,ml,mr,or,pa,ta,te,ur',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    }, 'google_translate_element');
  }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
  // Font size control
  (function() {
    const html = document.documentElement;
    const buttons = document.querySelectorAll('.font-size-btn');
    
    // Load saved font size
    const savedSize = localStorage.getItem('fontSize') || 'medium';
    html.setAttribute('data-font-size', savedSize);
    buttons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.size === savedSize);
    });

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const size = btn.dataset.size;
        html.setAttribute('data-font-size', size);
        localStorage.setItem('fontSize', size);
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Reading mode toggle
    const readingToggle = document.getElementById('readingModeToggle');
    if (readingToggle) {
      const savedReadingMode = localStorage.getItem('readingMode') === 'true';
      if (savedReadingMode) {
        document.body.classList.add('reading-mode');
        readingToggle.classList.add('active');
      }

      readingToggle.addEventListener('click', () => {
        document.body.classList.toggle('reading-mode');
        const isActive = document.body.classList.contains('reading-mode');
        localStorage.setItem('readingMode', isActive);
        readingToggle.classList.toggle('active', isActive);
      });
    }
  })();
</script>
