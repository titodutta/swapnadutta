<!-- header.html -->

<header class="site-header" role="banner">
  <div class="site-header-inner">

    <div class="site-title">
      <a href="{{ '/' | relative_url }}">
        {{ site.title | default: 'Swapna Dutta' }}
      </a>
    </div>

    {% if site.tagline %}
      <p class="site-tagline">
        {{ site.tagline }}
      </p>
    {% else %}
      <p class="site-tagline">
        In loving memory • স্মৃতির আলো
      </p>
    {% endif %}

    <nav class="site-nav" aria-label="Primary navigation">
      <ul>

        <li>
          <a
            href="{{ '/' | relative_url }}"
            {% if page.url == '/' %}
              aria-current="page"
            {% endif %}
          >
            Home
          </a>
        </li>

        <li>
          <a
            href="{{ '/articles/' | relative_url }}"
            {% if page.url contains '/articles' %}
              aria-current="page"
            {% endif %}
          >
            Articles
          </a>
        </li>

        <li>
          <a
            href="{{ '/photos/' | relative_url }}"
            {% if page.url contains '/photos' %}
              aria-current="page"
            {% endif %}
          >
            Photos
          </a>
        </li>

      </ul>
    </nav>

    <div class="site-header-ornament" aria-hidden="true">
      <span>✦ ✦ ✦</span>
    </div>

  </div>
</header>
