<header class="site-header">
  <div class="site-header__inner">

    {% if page.url == '/bn/' or page.url contains '/bn/' %}
      <a class="site-title" href="/bn/">{{ site.title_bn }}</a>
      <p class="site-tagline">{{ site.description_bn }}</p>
    {% else %}
      <a class="site-title" href="/">{{ site.title_en }}</a>
      <p class="site-tagline">{{ site.description_en }}</p>
    {% endif %}

  </div>
</header>
