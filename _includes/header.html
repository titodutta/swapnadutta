<header class="site-header">
  <div class="container site-header__inner">
    <div class="site-branding">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      {% if site.description %}
      <p class="site-tagline">{{ site.description }}</p>
      {% endif %}
    </div>

    <div class="site-header__navblock">
      <div class="language-switcher" aria-label="Language switcher">
        {% if page.lang == 'bn' %}
          <a href="{{ page.alternate_en | default: '/' | relative_url }}">English</a>
          <span aria-current="page">বাংলা</span>
        {% else %}
          <a href="{{ page.alternate_bn | default: '/bn/' | relative_url }}">বাংলা</a>
          <span aria-current="page">English</span>
        {% endif %}
      </div>

      <nav class="site-nav" aria-label="Primary navigation">
        <ul class="nav-list">
          {% if page.lang == 'bn' %}
            <li><a href="{{ '/bn/' | relative_url }}">হোম</a></li>
            <li><a href="{{ '/bn/articles/' | relative_url }}">প্রবন্ধ</a></li>
            <li><a href="{{ '/gallery/' | relative_url }}">গ্যালারি</a></li>
          {% else %}
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/articles/' | relative_url }}">Articles</a></li>
            <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
          {% endif %}
        </ul>
      </nav>
    </div>
  </div>
</header>
