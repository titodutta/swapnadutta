{% if page.categories and page.categories.size > 0 %}
<div class="category-footer-line">
  <span class="category-footer-label">{% if page.url contains '/bn/' %}শ্রেণীসমূহ:{% else %}Categories:{% endif %}</span>
  <div class="category-footer-links">
    {%- for cat in page.categories -%}
      <a href="{{ '/categories/' | relative_url }}{{ cat | slugify }}/">{{ cat }}</a>
      {%- unless forloop.last -%}
        <span class="category-footer-pipe">|</span>
      {%- endunless -%}
    {%- endfor -%}
  </div>
</div>

<style>
/* Clean typography footer line - drops the box background to fit naturally inside mobile padding */
.category-footer-line {
  display: block !important;
  width: 100% !important;
  margin-top: var(--space-10) !important;
  padding-top: var(--space-4);
  border-top: 1px solid var(--line); /* A simple subtle divider line above it */
  font-size: var(--text-sm);
  line-height: 1.4;
  clear: both;
}

.category-footer-label {
  font-weight: 700;
  color: var(--muted);
  display: inline-block;
  margin-right: var(--space-1);
}

.category-footer-links {
  display: inline;
}

.category-footer-links a {
  color: var(--accent) !important;
  text-decoration: none !important;
}

.category-footer-links a:hover {
  color: var(--accent-hover) !important;
  text-decoration: underline !important;
}

.category-footer-pipe {
  margin: 0 var(--space-2);
  color: var(--border);
  user-select: none;
}
</style>
{% endif %}
