{% if page.categories and page.categories.size > 0 %}
<div class="category-footer-box">
  <span class="category-footer-label">{% if page.url contains '/bn/' %}শ্রেণীসমূহ:{% else %}Categories:{% endif %}</span>
  <div class="category-footer-links">
    {% for cat in page.categories %}
      <a href="{{ '/categories/' | relative_url }}#{{ cat | slugify }}">{{ cat }}</a>{% unless forloop.last %}<span class="category-footer-pipe">|</span>{% endunless %}
    {% endfor %}
  </div>
</div>

<style>
/* Clean Base Box Framework */
.category-footer-box {
  margin-top: var(--space-8) !important;
  padding: var(--space-2) var(--space-3);
  background-color: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  line-height: 1.4;
  clear: both;
}

/* Forces structural components to lock horizontally flush without layout spaces */
.category-footer-box, 
.category-footer-links {
  display: inline-flex;
  flex-wrap: wrap;
  align-items: center;
}

.category-footer-label {
  font-weight: 700;
  color: var(--text);
  margin-right: var(--space-2);
}

.category-footer-links a {
  color: var(--accent) !important;
  text-decoration: none !important;
}

.category-footer-links a:hover {
  color: var(--accent-hover) !important;
  text-decoration: underline !important;
}

.category-footer-pipe {
  margin: 0 var(--space-2);
  color: var(--border);
  user-select: none;
}
</style>
{% endif %}
