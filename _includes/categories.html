{% if page.categories and page.categories.size > 0 %}
<div class="category-footer-box">
  <strong class="category-footer-label">
    {% if page.url contains '/bn/' %}শ্রেণীসমূহ:{% else %}Categories:{% endif %}
  </strong>
  <ul class="category-footer-list">
    {% for cat in page.categories %}
      <li>
        <a href="{{ '/categories/' | relative_url }}#{{ cat | slugify }}">{{ cat }}</a>
        {% unless forloop.last %}<span class="category-footer-divider">|</span>{% endunless %}
      </li>
    {% endfor %}
  </ul>
</div>

<style>
/* Base/Light Mode Styles */
.category-footer-box {
  margin-top: 2rem; 
  padding: 0.4rem 0.6rem; 
  background-color: #f9f9f9; 
  border: 1px solid #ccc; 
  border-radius: 6px; 
  font-size: 0.95rem; 
  clear: both;
  line-height: 1.4;
}

.category-footer-label {
  font-weight: 800; 
  color: #1a1a1a;
  display: inline;
  margin-right: 0.25rem;
}

.category-footer-list {
  list-style-type: none; 
  margin: 0; 
  padding: 0; 
  display: inline;
}

.category-footer-list li {
  display: inline;
  margin: 0;
  padding: 0;
}

.category-footer-list a {
  color: #005cc5; 
  text-decoration: none;
}

.category-footer-list a:hover {
  text-decoration: underline;
}

.category-footer-divider {
  margin: 0 0.4rem; 
  color: #ccc; 
  font-weight: normal; 
  user-select: none;
}

/* =========================================================
   Dark Mode Support Matrix
   ========================================================= */
@media (prefers-color-scheme: dark) {
  html:not(.forced-light) .category-footer-box {
    background-color: #1f2937;
    border-color: #374151;
  }
  html:not(.forced-light) .category-footer-label {
    color: #f3f4f6;
  }
  html:not(.forced-light) .category-footer-list a {
    color: #93c5fd;
  }
  html:not(.forced-light) .category-footer-divider {
    color: #4b5563;
  }
}

html.forced-dark .category-footer-box {
  background-color: #1f2937;
  border-color: #374151;
}
html.forced-dark .category-footer-label {
  color: #f3f4f6;
}
html.forced-dark .category-footer-list a {
  color: #93c5fd;
}
html.forced-dark .category-footer-divider {
  color: #4b5563;
}
</style>
{% endif %}
