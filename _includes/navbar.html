<nav class="topbar" aria-label="Accessibility and reading tools">
  <div class="container topbar-inner">
    <div class="topbar-language">
      {% if page.lang == 'bn' %}
        <span aria-current="true">বাংলা</span>
        {% if page.alternate_en %}
          <a href="{{ page.alternate_en | relative_url }}">English</a>
        {% else %}
          <span class="is-muted">English</span>
        {% endif %}
      {% else %}
        {% if page.alternate_bn %}
          <a href="{{ page.alternate_bn | relative_url }}">বাংলা</a>
        {% else %}
          <span class="is-muted">বাংলা</span>
        {% endif %}
        <span aria-current="true">English</span>
      {% endif %}
    </div>

    <div class="topbar-tools">
      <button class="topbar-button" id="decrease-font" type="button" aria-label="Decrease font size">A-</button>
      <button class="topbar-button" id="increase-font" type="button" aria-label="Increase font size">A+</button>
      <button class="topbar-button" id="reading-toggle" type="button" aria-pressed="false" aria-label="Toggle reader mode">Reader</button>
      <button class="topbar-button" id="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode">Dark</button>
      <button class="topbar-button" id="print-toggle" type="button" aria-label="Print this page">Print</button>
    </div>
  </div>
</nav>
