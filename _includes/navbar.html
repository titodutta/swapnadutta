<nav class="site-navbar" aria-label="Primary navigation">
  <div class="site-navbar__inner">
<button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
  ☰ Menu
</button>

    <ul id="primary-nav" class="nav-list">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/articles/' | relative_url }}">Articles</a></li>
      <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
    </ul>
  </div>

  <style>
.site-navbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.site-navbar__inner {
  width: min(96%, var(--page-width));
  margin: 0 auto;
  padding: var(--space-4) 0;
}

.nav-toggle {
  display: none;
  align-items: center;
  justify-content: flex-start;

  padding: 0.75rem 1rem;

  border: 1px solid #c8c0b3;
  border-radius: var(--radius-full);

  background: var(--surface-soft);

  cursor: pointer;
}

.nav-list {
  list-style: none;

  display: flex;
  flex-wrap: wrap;
  justify-content: center;

  gap: var(--space-2);

  padding-left: 0;
}

.nav-list a {
  display: inline-flex;
  align-items: center;

  min-height: 44px;

  padding: 0.45rem 0.9rem;

  border: 1px solid transparent;
  border-radius: var(--radius-full);

  color: var(--text);

  font-size: 0.97rem;
  font-weight: 500;

  text-decoration: none;
}

.nav-list a:hover,
.nav-list a:focus-visible {
  color: var(--accent-hover);

  background: var(--surface-soft);
  border-color: var(--border);

  outline: none;
}

@media (max-width: 820px) {

.nav-toggle {
  display: flex;
  width: 100%;
  justify-content: flex-start;
}

  .nav-list {
    display: none;

    margin-top: var(--space-3);

    flex-direction: column;

    gap: var(--space-2);

    padding: var(--space-3);

    border: 1px solid var(--border);
    border-radius: var(--radius-md);

    background: var(--surface-soft);
  }

  .nav-list.is-open {
    display: flex;
  }

  .nav-list a {
    width: 100%;
    justify-content: flex-start;
  }
}
  </style>
  <script>
    (function () {
      const toggle = document.querySelector('.nav-toggle');
      const nav = document.getElementById('primary-nav');
      if (!toggle || !nav) return;

      toggle.addEventListener('click', function () {
        const open = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
  </script>
</nav>
