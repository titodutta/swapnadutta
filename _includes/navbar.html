<!-- _includes/navbar.html -->

<style>
.topbar {
  position: sticky;
  top: 0;
  z-index: 2000;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #e5e7eb;
}

.topbar-inner {
  width: min(88%, 900px);
  margin-inline: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  padding: 0.7rem 0;
}

.topbar-search {
  flex: 1;
  max-width: 220px;
}

.topbar-search input {
  width: 100%;
  padding: 0.5rem 0.85rem;
  border: 1px solid #d1d5db;
  border-radius: 999px;
  font-size: 0.92rem;
  background: #ffffff;
  color: #111827;
}

.topbar-search input:focus {
  outline: none;
  border-color: #2563eb;
}

.topbar-tools {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.topbar-button {
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0.45rem 0.7rem;
  border-radius: 8px;
  color: #374151;
  font-size: 0.9rem;
  transition: background 0.2s ease;
}

.topbar-button:hover {
  background: #f3f4f6;
}

.topbar-button.active {
  background: #e0edff;
  color: #1d4ed8;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

  .topbar-inner {
    flex-direction: column;
    align-items: stretch;
  }

  .topbar-search {
    max-width: 100%;
  }

  .topbar-tools {
    justify-content: center;
    flex-wrap: wrap;
  }
}
</style>

<nav class="topbar" aria-label="Reading and accessibility tools">

  <div class="topbar-inner">

    <form class="topbar-search" action="{{ '/search/' | relative_url }}" method="get">

      <input
        type="search"
        name="q"
        placeholder="Search"
        aria-label="Search">

    </form>

    <div class="topbar-tools">

      <button
        class="topbar-button"
        id="font-decrease"
        title="Decrease font size"
        aria-label="Decrease font size">

        A−
      </button>

      <button
        class="topbar-button"
        id="font-reset"
        title="Reset font size"
        aria-label="Reset font size">

        A
      </button>

      <button
        class="topbar-button"
        id="font-increase"
        title="Increase font size"
        aria-label="Increase font size">

        A+
      </button>

      <button
        class="topbar-button"
        id="theme-toggle"
        title="Dark mode"
        aria-label="Toggle dark mode">

        ☾
      </button>

      <button
        class="topbar-button"
        id="reader-toggle"
        title="Calmer reading layout"
        aria-label="Reader mode">

        Reader
      </button>

      <button
        class="topbar-button"
        id="neuro-toggle"
        title="Extra spacing and easier reading"
        aria-label="Neurodivergent reading mode">

        ND
      </button>

    </div>

  </div>

</nav>

<script>
const body = document.body;

const increaseButton = document.getElementById('font-increase');
const decreaseButton = document.getElementById('font-decrease');
const resetButton = document.getElementById('font-reset');

const themeButton = document.getElementById('theme-toggle');
const readerButton = document.getElementById('reader-toggle');
const neuroButton = document.getElementById('neuro-toggle');

let currentSize =
  parseInt(localStorage.getItem('fontSize')) || 100;

function applyFontSize(size) {
  currentSize = size;
  body.style.fontSize = size + '%';
  localStorage.setItem('fontSize', size);
}

applyFontSize(currentSize);

increaseButton.addEventListener('click', () => {
  applyFontSize(Math.min(currentSize + 10, 160));
});

decreaseButton.addEventListener('click', () => {
  applyFontSize(Math.max(currentSize - 10, 80));
});

resetButton.addEventListener('click', () => {
  applyFontSize(100);
});

/* =========================
   DARK MODE
========================= */

if (localStorage.getItem('darkMode') === 'true') {
  body.classList.add('dark-mode');
  themeButton.classList.add('active');
}

themeButton.addEventListener('click', () => {

  body.classList.toggle('dark-mode');

  themeButton.classList.toggle('active');

  localStorage.setItem(
    'darkMode',
    body.classList.contains('dark-mode')
  );
});

/* =========================
   READER MODE
========================= */

if (localStorage.getItem('readerMode') === 'true') {
  body.classList.add('reading-mode');
  readerButton.classList.add('active');
}

readerButton.addEventListener('click', () => {

  body.classList.toggle('reading-mode');

  readerButton.classList.toggle('active');

  localStorage.setItem(
    'readerMode',
    body.classList.contains('reading-mode')
  );
});

/* =========================
   NEURODIVERGENT MODE
========================= */

if (localStorage.getItem('neuroMode') === 'true') {
  body.classList.add('neurodivergent-mode');
  neuroButton.classList.add('active');
}

neuroButton.addEventListener('click', () => {

  body.classList.toggle('neurodivergent-mode');

  neuroButton.classList.toggle('active');

  localStorage.setItem(
    'neuroMode',
    body.classList.contains('neurodivergent-mode')
  );
});
</script>
