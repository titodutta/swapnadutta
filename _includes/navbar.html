<!-- _includes/navbar.html -->

<nav class="topbar" aria-label="Reading and accessibility tools">

<style>
.topbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #ffffff;
  border-bottom: 1px solid #e5e7eb;
}

.topbar-inner {
  width: min(88%, 900px);
  margin-inline: auto;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 0.6rem;
  padding: 0.7rem 0;
}

.topbar-search input {
  width: 180px;
  padding: 0.45rem 0.8rem;
  border: 1px solid #d1d5db;
  border-radius: 999px;
  font-size: 0.9rem;
  background: #ffffff;
  color: #111827;
}

.topbar-search input:focus {
  outline: none;
  border-color: #2563eb;
}

.topbar-button {
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0.35rem 0.6rem;
  border-radius: 8px;
  color: #374151;
  font-size: 0.9rem;
}

.topbar-button:hover {
  background: #f3f4f6;
}

@media (max-width: 768px) {

  .topbar-inner {
    flex-wrap: nowrap;
    overflow-x: auto;
    justify-content: flex-start;
    scrollbar-width: none;
  }

  .topbar-inner::-webkit-scrollbar {
    display: none;
  }

  .topbar-search input {
    width: 140px;
    min-width: 140px;
  }

  .topbar-button {
    white-space: nowrap;
    flex-shrink: 0;
  }
}
</style>

<div class="topbar-inner">

  <form class="topbar-search" action="{{ '/search/' | relative_url }}" method="get">

    <input
      type="search"
      name="q"
      placeholder="Search"
      aria-label="Search">

  </form>

  <button class="topbar-button" aria-label="Decrease font size">A-</button>

  <button class="topbar-button" aria-label="Increase font size">A+</button>

  <button class="topbar-button" aria-label="Toggle dark mode">☾</button>

  <button class="topbar-button" aria-label="Reading mode">Reader</button>

</div>

</nav>
