<nav class="site-navbar" aria-label="Primary navigation">
  <div class="site-navbar__inner">
    {% if page.breadcrumbs and page.breadcrumbs.size > 0 %}
    <div class="breadcrumbs-wrap">
      <ol class="breadcrumbs">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        {% for item in page.breadcrumbs %}
        <li>
          {% if forloop.last %}
            <span aria-current="page">{{ item.title }}</span>
          {% else %}
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          {% endif %}
        </li>
        {% endfor %}
      </ol>
    </div>
    {% endif %}

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
      <span class="nav-toggle__label">Menu</span>
    </button>

    <ul id="primary-nav" class="nav-list">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/articles/' | relative_url }}">Articles</a></li>
      <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
      <li><a href="{{ '/about/' | relative_url }}">About</a></li>
    </ul>
  </div>

  <script>
    (function () {
      const toggle = document.querySelector('.nav-toggle');
      const nav = document.getElementById('primary-nav');
      if (!toggle || !nav) return;

      toggle.addEventListener('click', function () {
        const isOpen = nav.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
    })();
  </script>
</nav>
